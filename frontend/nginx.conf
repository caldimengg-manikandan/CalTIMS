server {
    listen 80;
    server_name localhost;

    location /caltims/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /caltims/index.html;
    }

    # Explicitly handle assets to ensure correct MIME types
    location /caltims/assets/ {
        root /usr/share/nginx/html;
        expires max;
        access_log off;
    }

    # Redirect root to /caltims/
    location / {
        return 301 /caltims/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
