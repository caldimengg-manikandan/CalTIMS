version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: database_caltims
    restart: always
    environment:
      POSTGRES_USER: caltims_admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: caltims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_caltims
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@caltims.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: