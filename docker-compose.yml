version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: database_caltims
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-caltims_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
      POSTGRES_DB: ${DB_NAME:-caltims_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - caltims_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_caltims
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-caltims_admin}:${DB_PASSWORD:-mysecretpassword}@postgres:5432/${DB_NAME:-caltims_db}?schema=public
      PORT: 5000
      NODE_ENV: production
      # Add other env variables here or use .env file
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    networks:
      - caltims_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_caltims
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - caltims_network

networks:
  caltims_network:
    driver: bridge

volumes:
  postgres_data: